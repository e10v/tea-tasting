name: ci-docs
on:
  pull_request:
    paths:
      - '*.md'
      - 'docs/*.md'
      - 'examples/*'
      - '.markdownlint.yml'
      - '.github/workflows/ci-docs.yml'
      - 'src/_internal/sync_examples.py'
      - 'src/_internal/sync_readme.py'
  push:
    branches: [main]
    paths:
      - '*.md'
      - 'docs/*.md'
      - 'examples/*'
      - '.markdownlint.yml'
      - '.github/workflows/ci-docs.yml'
      - 'src/_internal/sync_examples.py'
      - 'src/_internal/sync_readme.py'
  workflow_dispatch:
jobs:
  doctest-md:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.3
      - name: set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          activate-environment: true
          cache-suffix: "3.13-test"
          enable-cache: true
          python-version: "3.13"
      - name: install dependencies
        run: uv sync --group test
      - name: check examples sync
        run: uv run src/_internal/sync_examples.py --check
      - name: check readme sync
        run: uv run src/_internal/sync_readme.py --check
      - name: doctest
        run: |
          pytest \
            --doctest-continue-on-failure \
            --doctest-glob=*.md \
            --ignore=examples/ \
            --ignore=tests/
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.3
      - name: lint
        uses: DavidAnson/markdownlint-cli2-action@v22.0.0
        with:
          globs: |
            *.md
            docs/*.md
            examples/*.md
