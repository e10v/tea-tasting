name: ci
on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/ci.yml'
      - 'pyproject.toml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/ci.yml'
      - 'pyproject.toml'
  workflow_dispatch:
jobs:
  doctest:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.3
      - name: set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          activate-environment: true
          cache-suffix: "3.13-test"
          enable-cache: true
          python-version: "3.13"
      - name: install dependencies
        run: uv sync --group test --all-extras
      - name: doctest
        run: |
          pytest \
            --doctest-continue-on-failure \
            --doctest-glob=*.md \
            --doctest-modules \
            --ignore=examples/ \
            --ignore=tests/ \
            --ignore-glob=src/_*
  test-lowest:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.3
      - name: set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          activate-environment: true
          cache-suffix: "3.12-test-lowest"
          enable-cache: true
          python-version: "3.12"
      - name: install dependencies
        run: uv sync --group test --all-extras --resolution lowest-direct
      - name: test-lowest
        run: pytest
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.3
      - name: set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          activate-environment: true
          cache-suffix: "${{ matrix.python-version }}-test"
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: install dependencies
        run: uv sync --group test --all-extras
      - name: test
        run: coverage run -m pytest
      - name: convert coverage report
        run: coverage xml
      - name: upload coverage reports to codecov
        uses: codecov/codecov-action@v6.0.1
        with:
          files: ./coverage.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.3
      - name: set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          activate-environment: true
          cache-suffix: "${{ matrix.python-version }}-lint"
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: install dependencies
        run: uv sync --group lint --group test --all-extras
      - name: lint
        run: ruff check
      - name: check types
        run: ty check
